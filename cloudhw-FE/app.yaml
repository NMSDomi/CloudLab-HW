runtime: custom
env: flex
service: default

resources:
  cpu: 1
  memory_gb: 1
  disk_size_gb: 10

automatic_scaling:
  min_num_instances: 1
  max_num_instances: 3
  cool_down_period_sec: 60
  cpu_utilization:
    target_utilization: 0.5
  target_concurrent_requests: 15

env_variables:
  BACKEND_URL: "${BACKEND_URL}"