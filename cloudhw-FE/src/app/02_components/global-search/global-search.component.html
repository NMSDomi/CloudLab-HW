<div class="gs-backdrop" *ngIf="isOpen()" (click)="onBackdropClick($event)">
  <div class="gs-modal" role="dialog" aria-label="Search albums">

    <!-- Search input row -->
    <div class="gs-input-row">
      <svg class="gs-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <input
        #searchInput
        class="gs-input"
        type="text"
        placeholder="Search albums…"
        autocomplete="off"
        [ngModel]="query()"
        (ngModelChange)="onQueryChange($event)"
      />
      <kbd class="gs-esc-hint">Esc</kbd>
    </div>

    <!-- Results -->
    <div class="gs-results" *ngIf="query().trim().length > 0">

      <div class="gs-loading" *ngIf="loading()">
        <span class="gs-spinner"></span>
        <span>Loading…</span>
      </div>

      <ng-container *ngIf="!loading()">
        <button
          *ngFor="let album of results(); let i = index"
          class="gs-result-item"
          [class.gs-result-item--active]="activeIndex() === i"
          (click)="selectAlbum(album)"
          (mouseenter)="activeIndex.set(i)"
        >
          <div class="gs-result-thumb">
            <img *ngIf="getCoverUrl(album)" [src]="getCoverUrl(album)" [alt]="album.name" class="gs-result-thumb-img" />
            <svg *ngIf="!getCoverUrl(album)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <path d="M22 16V4c0-1.1-.9-2-2-2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2zm-11-4l2.03 2.71L16 11l4 5H8l3-4zM2 6v14c0 1.1.9 2 2 2h14v-2H4V6H2z"/>
            </svg>
          </div>
          <div class="gs-result-info">
            <span class="gs-result-name">{{ album.name }}</span>
            <span class="gs-result-owner" *ngIf="album.ownerName">by {{ album.ownerName }}</span>
          </div>
          <div class="gs-result-badges">
            <span class="badge badge--public" *ngIf="album.isPublic">Public</span>
            <span class="badge badge--shared" *ngIf="isSharedWithMe(album)">Shared</span>
            <span class="badge badge--private" *ngIf="isPrivateMine(album)">Private</span>
          </div>
        </button>

        <div class="gs-empty" *ngIf="results().length === 0">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path d="M11 15h2v2h-2zm0-8h2v6h-2zm.99-5C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/>
          </svg>
          <span>No albums found for "{{ query() }}"</span>
        </div>
      </ng-container>
    </div>

    <!-- Hint when nothing typed yet -->
    <div class="gs-hint" *ngIf="query().trim().length === 0 && !loading()">
      Start typing to search albums…
    </div>

    <!-- Footer -->
    <div class="gs-footer">
      <span><kbd>↑</kbd><kbd>↓</kbd> Navigate</span>
      <span><kbd>Enter</kbd> Open</span>
      <span><kbd>Esc</kbd> Close</span>
      <span style="margin-left:auto"><kbd>{{ searchShortcut }}</kbd> Toggle</span>
    </div>
  </div>
</div>
