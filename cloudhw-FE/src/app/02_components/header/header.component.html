<header class="header">
  <!-- Left: Brand -->
  <div class="header__brand" [routerLink]="['/']">
    <div class="header__logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M19.35 10.04A7.49 7.49 0 0 0 12 4C9.11 4 6.6 5.64 5.35 8.04A5.994 5.994 0 0 0 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/>
      </svg>
    </div>
    <span class="header__brand-name">PikVjú</span>
  </div>

  <!-- Right: actions + user -->
  <div class="header__actions">

    <!-- Global search trigger -->
    <button class="header__search-btn" (click)="openSearch()" [title]="'header.searchTitle' | translate">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <span class="header__search-btn-text">{{ 'header.search' | translate }}</span>
      <kbd class="header__search-kbd">{{ searchShortcut }}</kbd>
    </button>

    <!-- Theme toggle -->
    <button class="header__theme-btn" (click)="toggleTheme()" [title]="isDark() ? ('header.switchToLight' | translate) : ('header.switchToDark' | translate)">
      @if (isDark()) {
        <!-- Sun icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      } @else {
        <!-- Moon icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      }
    </button>

    <!-- Language dropdown -->
    <div class="header__lang" [class.header__lang--open]="langDropdownOpen">
      <button class="header__lang-trigger" (click)="langDropdownOpen = !langDropdownOpen" [title]="'header.langTitle' | translate">
        <img
          class="header__lang-flag"
          [src]="langService.currentLang() === 'en'
            ? 'https://flagsapi.com/GB/flat/32.png'
            : 'https://flagsapi.com/HU/flat/32.png'"
          [alt]="langService.currentLang() === 'en' ? 'EN' : 'HU'"
          title="langService.currentLang() === 'en' ? 'English' : 'Magyar'"
        />
      </button>
      <div class="header__lang-menu">
        <button class="header__lang-option" [class.header__lang-option--active]="langService.currentLang() === 'en'"
          (click)="langService.switchLang('en'); langDropdownOpen = false">
          <img class="header__lang-flag" src="https://flagsapi.com/GB/flat/32.png" alt="EN" />
          <span>English</span>
          @if (langService.currentLang() === 'en') {
            <svg class="header__lang-check" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          }
        </button>
        <button class="header__lang-option" [class.header__lang-option--active]="langService.currentLang() === 'hu'"
          (click)="langService.switchLang('hu'); langDropdownOpen = false">
          <img class="header__lang-flag" src="https://flagsapi.com/HU/flat/32.png" alt="HU" />
          <span>Magyar</span>
          @if (langService.currentLang() === 'hu') {
            <svg class="header__lang-check" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          }
        </button>
      </div>
    </div>

    <!-- User section -->
    <ng-container *ngIf="currentUser(); else loginBtn">
      <div class="header__user" (mouseenter)="dropdownOpen = true" (mouseleave)="dropdownOpen = false">
        <div class="header__avatar" [title]="currentUser()!.name" [routerLink]="['/profile', 'me']">
          {{ userInitials() }}
        </div>
        <span class="header__user-name" [routerLink]="['/profile', 'me']">{{ currentUser()!.name }}</span>

        <!-- Logout icon -->
        <button class="header__logout-icon" (click)="onLogout()" title={{header.signOut | translate }}>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
          </svg>
        </button>

        <!-- Dropdown -->
        <!-- <div class="header__dropdown" *ngIf="dropdownOpen">
          <a class="header__dropdown-item" routerLink="/albums">
            <span>Albums</span>
          </a>
          <a class="header__dropdown-item" [routerLink]="['/profile', currentUser()!.id]">
            <span>Profile</span>
          </a>
        </div>           -->
      </div>
    </ng-container>

    <ng-template #loginBtn>
      <button class="btn btn--login" (click)="onLogin()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
        </svg>
        <span>{{ 'header.loginBtn' | translate }}</span>
      </button>
    </ng-template>
  </div>
</header>
