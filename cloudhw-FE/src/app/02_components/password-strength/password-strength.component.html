@if (password.length > 0) {
  <div class="pw-strength">
    <!-- Segmented bar -->
    <div class="pw-segments">
      @for (lit of strength.segments; track $index) {
        <div class="pw-seg"
             [class.lit]="lit"
             [style.background]="lit ? strength.color : ''"
             [style.box-shadow]="lit ? '0 0 8px ' + strength.glow : 'none'">
        </div>
      }
    </div>

    <span class="pw-label" [style.color]="strength.color">{{ strength.label }}</span>

    <!-- Rule checklist -->
    <div class="pw-rules">
      @for (rule of strength.rules; track rule.label) {
        <div class="pw-rule" [class.met]="rule.met">
          <div class="pw-rule__dot" [style.background]="rule.met ? strength.color : ''" [style.box-shadow]="rule.met ? '0 0 6px ' + strength.glow : 'none'">
            @if (rule.met) {
              <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2.5 6L5 8.5L9.5 3.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            }
          </div>
          <span>{{ rule.label }}</span>
        </div>
      }
    </div>
  </div>
}
