<div class="auth-container">
  <div class="auth-card" style="text-align:center">
    <div class="auth-logo">
      <div class="auth-logo__icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19.35 10.04A7.49 7.49 0 0 0 12 4C9.11 4 6.6 5.64 5.35 8.04A5.994 5.994 0 0 0 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/>
        </svg>
      </div>
      <h1 class="auth-logo__title">PikVjú</h1>
    </div>

    @if (invalidLink) {
      <div class="reset-status error">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <p>Érvénytelen jelszó visszaállító link.</p>
        <button class="btn-submit" (click)="goToLogin()">Vissza a bejelentkezéshez</button>
      </div>
    }

    @if (!invalidLink && successMessage) {
      <div class="reset-status success">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <p>{{ successMessage }}</p>
        <button class="btn-submit" (click)="goToLogin()">Bejelentkezés</button>
      </div>
    }

    @if (!invalidLink && !successMessage) {
      <h2 class="form-heading">Új jelszó megadása</h2>

      @if (errorMessage) {
        <div class="auth-error">{{ errorMessage }}</div>
      }

      <form class="auth-form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="newPassword">Új jelszó</label>
          <input
            id="newPassword"
            type="password"
            placeholder="••••••••"
            [(ngModel)]="newPassword"
            name="newPassword"
            required
          />
          <app-password-strength [password]="newPassword" (valid)="passwordValid = $event"></app-password-strength>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Jelszó megerősítése</label>
          <input
            id="confirmPassword"
            type="password"
            placeholder="••••••••"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            required
          />
        </div>
        <button class="btn-submit" type="submit" [disabled]="loading || !passwordValid || newPassword !== confirmPassword">
          @if (loading) {
            <span class="spinner"></span>
          }
          Jelszó mentése
        </button>
      </form>
    }
  </div>
</div>
