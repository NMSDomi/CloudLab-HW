services:
  cloudhw-db:
    image: postgres
    container_name: cloudhw-db
    restart: always
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - cloudhw-db-data:/var/lib/postgresql/data
    networks: 
      - cloudhw-network

  cloudhw-pgadmin:
    image: dpage/pgadmin4
    container_name: cloudhw-pgadmin
    restart: always
    ports:
      - "5055:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - cloudhw-pgadmin-data:/var/lib/pgadmin
    networks:
      - cloudhw-network

volumes:
  cloudhw-db-data:
  cloudhw-pgadmin-data:

networks:
  cloudhw-network:
    driver: bridge