name: Release

on:
  push:
    branches:
      - release

env:
  GHCR_REGISTRY: ghcr.io
  GCR_REGISTRY: gcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # Job 1 – Build Docker images and push to GHCR + GCR
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      be-gcr-image: ${{ steps.meta-be.outputs.gcr-image }}
      fe-gcr-image: ${{ steps.meta-fe.outputs.gcr-image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Authenticate to Google Cloud ──────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      # ── Log in to GCR ─────────────────────────────────────────────────
      - name: Log in to GCR
        uses: docker/login-action@v3
        with:
          registry: gcr.io
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      # ── Authenticate to GHCR ──────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Set up Docker Buildx ──────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend image ─────────────────────────────────────────────────
      - name: Set BE image tags
        id: meta-be
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "ghcr-image=${{ env.GHCR_REGISTRY }}/${OWNER}/cloudhw-be:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"
          echo "gcr-image=${{ env.GCR_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/cloudhw-be:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"

      - name: Build & push BE image
        uses: docker/build-push-action@v5
        with:
          context: cloudhw-BE
          file: cloudhw-BE/Dockerfile
          push: true
          tags: |
            ${{ steps.meta-be.outputs.ghcr-image }}
            ${{ steps.meta-be.outputs.gcr-image }}
          cache-from: type=gha,scope=be
          cache-to: type=gha,mode=max,scope=be

      # ── Frontend image ────────────────────────────────────────────────
      - name: Set FE image tags
        id: meta-fe
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "ghcr-image=${{ env.GHCR_REGISTRY }}/${OWNER}/cloudhw-fe:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"
          echo "gcr-image=${{ env.GCR_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/cloudhw-fe:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"

      - name: Build & push FE image
        uses: docker/build-push-action@v5
        with:
          context: cloudhw-FE
          file: cloudhw-FE/Dockerfile
          push: true
          tags: |
            ${{ steps.meta-fe.outputs.ghcr-image }}
            ${{ steps.meta-fe.outputs.gcr-image }}
          cache-from: type=gha,scope=fe
          cache-to: type=gha,mode=max,scope=fe

  # ─────────────────────────────────────────────
  # Job 2 – Deploy to Google App Engine
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to App Engine
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── Frontend –───────────
      - name: Render FE app.yaml
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: envsubst < cloudhw-FE/app.yaml > cloudhw-FE/app.rendered.yaml

      - name: Deploy FE to App Engine
        run: |
          gcloud app deploy cloudhw-FE/app.rendered.yaml \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --quiet

      # ── Backend –────────────
      - name: Render BE app.yaml
        env:
          POSTGRES_HOST:     ${{ secrets.POSTGRES_HOST }}
          POSTGRES_USER:     ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB:       ${{ secrets.POSTGRES_DB }}
          JWT_ISSUER:        ${{ secrets.JWT_ISSUER }}
          JWT_AUDIANCE:      ${{ secrets.JWT_AUDIANCE }}
          JWT_KEY:           ${{ secrets.JWT_KEY }}
          ADMIN_EMAIL:                ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD:             ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_NAME:                 ${{ secrets.ADMIN_NAME }}
          FRONTEND_URL:               ${{ secrets.FRONTEND_URL }}
          GCP_CLOUDSQL_CONNECTION_NAME: ${{ secrets.GCP_CLOUDSQL_CONNECTION_NAME }}
        run: envsubst < cloudhw-BE/app.yaml > cloudhw-BE/app.rendered.yaml

      - name: Deploy BE to App Engine
        run: |
          gcloud app deploy cloudhw-BE/app.rendered.yaml \
            --image-url=${{ env.GCR_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/cloudhw-be:${{ env.IMAGE_TAG }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --quiet
