name: Release

on:
  push:
    branches:
      - release

jobs:
  # Build & push Docker images to GCR
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    outputs:
      be-image: ${{ steps.be.outputs.image }}
      fe-image: ${{ steps.fe.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build & push Backend image
        id: be
        run: |
          IMAGE="gcr.io/${{ secrets.GCP_PROJECT_ID }}/cloudhw-be:${{ github.sha }}"
          docker build -t "$IMAGE" cloudhw-BE
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build & push Frontend image
        id: fe
        run: |
          IMAGE="gcr.io/${{ secrets.GCP_PROJECT_ID }}/cloudhw-fe:${{ github.sha }}"
          docker build -t "$IMAGE" cloudhw-FE
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  # Deploy to Google App Engine
  deploy:
    name: Deploy to App Engine
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── Backend ────────────
      - name: Render BE app.yaml
        env:
          POSTGRES_HOST:     ${{ secrets.POSTGRES_HOST }}
          POSTGRES_USER:     ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB:       ${{ secrets.POSTGRES_DB }}
          JWT_ISSUER:        ${{ secrets.JWT_ISSUER }}
          JWT_AUDIANCE:      ${{ secrets.JWT_AUDIANCE }}
          JWT_KEY:           ${{ secrets.JWT_KEY }}
          ADMIN_EMAIL:                ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD:             ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_NAME:                 ${{ secrets.ADMIN_NAME }}
          FRONTEND_URL:               ${{ secrets.FRONTEND_URL }}
          ASPNETCORE_AllowedHosts:    ${{ secrets.ASPNETCORE_AllowedHosts }}
          GCP_CLOUDSQL_CONNECTION_NAME: ${{ secrets.GCP_CLOUDSQL_CONNECTION_NAME }}
          SMTP_HOST:     ${{ secrets.SMTP_HOST }}
          SMTP_PORT:     ${{ secrets.SMTP_PORT }}
          SMTP_USER:     ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM:     ${{ secrets.SMTP_FROM }}
        run: envsubst < cloudhw-BE/app.yaml > cloudhw-BE/app.rendered.yaml

      - name: Deploy BE to App Engine
        run: |
          gcloud app deploy cloudhw-BE/app.rendered.yaml \
            --image-url=${{ needs.build-and-push.outputs.be-image }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --quiet

      # ── Frontend ───────────
      - name: Render FE app.yaml
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: envsubst < cloudhw-FE/app.yaml > cloudhw-FE/app.rendered.yaml

      - name: Deploy FE to App Engine
        run: |
          gcloud app deploy cloudhw-FE/app.rendered.yaml \
            --image-url=${{ needs.build-and-push.outputs.fe-image }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --quiet
