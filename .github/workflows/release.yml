name: Release

on:
  push:
    branches:
      - release

jobs:
  terraform_apply:
    name: Provision Infrastructure
    runs-on: ubuntu-latest

    outputs:
      artifact_registry_url: ${{ steps.tf_outputs.outputs.artifact_registry_repository_url }}
      cloudsql_connection_name: ${{ steps.tf_outputs.outputs.cloud_sql_connection_name }}
      cloudsql_socket_host: ${{ steps.tf_outputs.outputs.cloud_sql_socket_host }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" -backend-config="prefix=cloudhw/release"

      - name: Terraform Apply
        working-directory: infra/terraform
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ secrets.GCP_REGION }}
          TF_VAR_app_engine_location: ${{ secrets.GCP_APP_ENGINE_LOCATION }}
          TF_VAR_artifact_registry_repository: ${{ secrets.GCP_ARTIFACT_REGISTRY_REPOSITORY }}
          TF_VAR_cloud_sql_instance_name: ${{ secrets.GCP_CLOUDSQL_INSTANCE_NAME }}
          TF_VAR_postgres_db: ${{ secrets.POSTGRES_DB }}
          TF_VAR_postgres_user: ${{ secrets.POSTGRES_USER }}
          TF_VAR_postgres_password: ${{ secrets.POSTGRES_PASSWORD }}
          TF_VAR_deletion_protection: "true"
        run: terraform apply -auto-approve

      - name: Read Terraform Outputs
        id: tf_outputs
        working-directory: infra/terraform
        run: |
          echo "artifact_registry_repository_url=$(terraform output -raw artifact_registry_repository_url)" >> "$GITHUB_OUTPUT"
          echo "cloud_sql_connection_name=$(terraform output -raw cloud_sql_connection_name)" >> "$GITHUB_OUTPUT"
          echo "cloud_sql_socket_host=$(terraform output -raw cloud_sql_socket_host)" >> "$GITHUB_OUTPUT"

  # Build & push Docker images to Artifact Registry
  build_and_push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: terraform_apply

    outputs:
      be_image: ${{ steps.be.outputs.image }}
      fe_image: ${{ steps.fe.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & push Backend image
        id: be
        run: |
          IMAGE="${{ needs.terraform_apply.outputs.artifact_registry_url }}/cloudhw-be:${{ github.sha }}"
          docker build -t "$IMAGE" cloudhw-BE
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build & push Frontend image
        id: fe
        run: |
          IMAGE="${{ needs.terraform_apply.outputs.artifact_registry_url }}/cloudhw-fe:${{ github.sha }}"
          docker build -t "$IMAGE" cloudhw-FE
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  # Deploy to Google App Engine
  deploy:
    name: Deploy to App Engine
    runs-on: ubuntu-latest
    needs:
      - terraform_apply
      - build_and_push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── Backend ────────────
      - name: Render BE app.yaml
        env:
          POSTGRES_HOST:     ${{ needs.terraform_apply.outputs.cloudsql_socket_host }}
          POSTGRES_USER:     ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB:       ${{ secrets.POSTGRES_DB }}
          JWT_ISSUER:        ${{ secrets.JWT_ISSUER }}
          JWT_AUDIANCE:      ${{ secrets.JWT_AUDIANCE }}
          JWT_KEY:           ${{ secrets.JWT_KEY }}
          ADMIN_EMAIL:                ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD:             ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_NAME:                 ${{ secrets.ADMIN_NAME }}
          FRONTEND_URL:               ${{ secrets.FRONTEND_URL }}
          ASPNETCORE_AllowedHosts:    ${{ secrets.ASPNETCORE_AllowedHosts }}
          GCP_CLOUDSQL_CONNECTION_NAME: ${{ needs.terraform_apply.outputs.cloudsql_connection_name }}
          SMTP_HOST:     ${{ secrets.SMTP_HOST }}
          SMTP_PORT:     ${{ secrets.SMTP_PORT }}
          SMTP_USER:     ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM:     ${{ secrets.SMTP_FROM }}
        run: envsubst < cloudhw-BE/app.yaml > cloudhw-BE/app.rendered.yaml

      - name: Deploy BE to App Engine
        run: |
          gcloud app deploy cloudhw-BE/app.rendered.yaml \
            --image-url=${{ needs.build_and_push.outputs.be_image }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --quiet

      # ── Frontend ───────────
      - name: Render FE app.yaml
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: envsubst < cloudhw-FE/app.yaml > cloudhw-FE/app.rendered.yaml

      - name: Deploy FE to App Engine
        run: |
          gcloud app deploy cloudhw-FE/app.rendered.yaml \
            --image-url=${{ needs.build_and_push.outputs.fe_image }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --quiet
